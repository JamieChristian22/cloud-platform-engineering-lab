apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-web
  labels:
    app: portfolio-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio-web
  template:
    metadata:
      labels:
        app: portfolio-web
    spec:
      containers:
        - name: portfolio-web
          image: nginx:alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-web-service
spec:
  selector:
    app: portfolio-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
