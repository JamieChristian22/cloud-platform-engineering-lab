apiVersion: v1
kind: LimitRange
metadata:
  name: default-container-limits
  namespace: workload-production
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "250m"
        memory: "256Mi"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-container-limits
  namespace: workload-development
spec:
  limits:
    - type: Container
      default:
        cpu: "250m"
        memory: "256Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-container-limits
  namespace: sandbox-lab
spec:
  limits:
    - type: Container
      default:
        cpu: "200m"
        memory: "256Mi"
      defaultRequest:
        cpu: "50m"
        memory: "64Mi"
