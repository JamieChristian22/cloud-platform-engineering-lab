apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: log-collector
  namespace: observability
  labels:
    app: log-collector
    app.kubernetes.io/part-of: enterprise-observability
spec:
  selector:
    matchLabels:
      app: log-collector
  template:
    metadata:
      labels:
        app: log-collector
        app.kubernetes.io/part-of: enterprise-observability
    spec:
      serviceAccountName: observability-reader
      containers:
        - name: log-collector
          image: fluent/fluent-bit:3.1
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: varlog
              mountPath: /var/log
            - name: containers
              mountPath: /var/lib/docker/containers
              readOnly: true
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: containers
          hostPath:
            path: /var/lib/docker/containers
